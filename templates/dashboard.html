{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Minhas Credenciais</h2>

<div class="card mb-4">
    <div class="card-header">Adicionar Nova Senha</div>
    <div class="card-body">
        <form action="/create-credential" method="post">
            <div class="row mb-3">
                <div class="col">
                    <input type="text" class="form-control" name="service" placeholder="Serviço (ex: Netflix)" required>
                </div>
                <div class="col">
                    <input type="text" class="form-control" name="username" placeholder="Login/Usuário" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-8">
                    <input type="text" class="form-control" id="password" name="password" placeholder="Senha" required>
                </div>
                <div class="col-4">
                    <button type="button" class="btn btn-warning w-100" onclick="generatePassword()">Gerar Senha Forte</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Salvar no Cofre</button>
        </form>
    </div>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Serviço</th>
            <th>Usuário</th>
            <th>Ação</th>
        </tr>
    </thead>
    <tbody>
        {% for cred in credentials %}
        <tr>
            <td>{{ cred.service }}</td>
            <td>{{ cred.username }}</td>
            <td>
                <button class="btn btn-sm btn-info" onclick="revealPassword('{{ cred.id }}')">Revelar Senha</button>
                <span id="revealed-{{ cred.id }}" class="ms-2 fw-bold text-danger"></span>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
// Lógica do Gerador de Senhas (puro JS)
function generatePassword() {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
    let password = "";
    for (let i = 0; i < 16; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('password').value = password;
}

// Lógica para descriptografar e mostrar a senha
function revealPassword(credId) {
    fetch('/revelar_senha/' + credId, {
        method: 'POST'
    })
    .then(response => response.json())
    .then(data => {
        if(data.password) {
            document.getElementById('revealed-' + credId).innerText = data.password;
        } else {
            alert('Erro ao descriptografar.');
        }
    });
}
</script>
{% endblock %}
